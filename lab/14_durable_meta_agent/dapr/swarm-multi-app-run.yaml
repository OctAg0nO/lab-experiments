version: 1
apps:
  - appID: swarm-coordinator
    appDirPath: ../../
    appPort: 8000
    command:
      [
        "uv",
        "run",
        "python",
        "-m",
        "lab.14_durable_meta_agent",
        "swarm-coordinator",
        "--workers",
        "3",
      ]
    appProtocol: grpc
    resourcesPath: lab/14_durable_meta_agent/dapr/resources

  - appID: swarm-worker-0
    appDirPath: ../../
    appPort: 8001
    command:
      [
        "uv",
        "run",
        "python",
        "-m",
        "lab.14_durable_meta_agent",
        "swarm-worker",
        "--worker-id",
        "swarm-worker-0",
        "--domain",
        "research",
        "--port",
        "8001",
      ]
    appProtocol: grpc
    resourcesPath: lab/14_durable_meta_agent/dapr/resources

  - appID: swarm-worker-1
    appDirPath: ../../
    appPort: 8002
    command:
      [
        "uv",
        "run",
        "python",
        "-m",
        "lab.14_durable_meta_agent",
        "swarm-worker",
        "--worker-id",
        "swarm-worker-1",
        "--domain",
        "verification",
        "--port",
        "8002",
      ]
    appProtocol: grpc
    resourcesPath: lab/14_durable_meta_agent/dapr/resources

  - appID: swarm-worker-2
    appDirPath: ../../
    appPort: 8003
    command:
      [
        "uv",
        "run",
        "python",
        "-m",
        "lab.14_durable_meta_agent",
        "swarm-worker",
        "--worker-id",
        "swarm-worker-2",
        "--domain",
        "synthesis",
        "--port",
        "8003",
      ]
    appProtocol: grpc
    resourcesPath: lab/14_durable_meta_agent/dapr/resources
