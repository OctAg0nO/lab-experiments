version: 1
apps:
  - appID: orchestrator
    appDirPath: ../../
    appPort: 8000
    command: ["uv", "run", "python", "-m", "lab.10_dapr_deep_research", "orchestrator"]
    appProtocol: grpc
    resourcesPath: lab/10_dapr_deep_research/resources
  - appID: explorer-agent
    appDirPath: ../../
    appPort: 8001
    command: ["uv", "run", "python", "-m", "lab.10_dapr_deep_research", "explorer"]
    appProtocol: grpc
    resourcesPath: lab/10_dapr_deep_research/resources
  - appID: deepreader-agent
    appDirPath: ../../
    appPort: 8002
    command: ["uv", "run", "python", "-m", "lab.10_dapr_deep_research", "deepreader"]
    appProtocol: grpc
    resourcesPath: lab/10_dapr_deep_research/resources
  - appID: synthesizer-agent
    appDirPath: ../../
    appPort: 8003
    command: ["uv", "run", "python", "-m", "lab.10_dapr_deep_research", "synthesizer"]
    appProtocol: grpc
    resourcesPath: lab/10_dapr_deep_research/resources
  - appID: critic-agent
    appDirPath: ../../
    appPort: 8004
    command: ["uv", "run", "python", "-m", "lab.10_dapr_deep_research", "critic"]
    appProtocol: grpc
    resourcesPath: lab/10_dapr_deep_research/resources
