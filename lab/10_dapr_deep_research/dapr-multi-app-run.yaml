version: 1
apps:
  - appID: orchestrator
    appDirPath: ./
    appPort: 8000
    command: python -m lab.10_dapr_deep_research --mode orchestrator
    appProtocol: grpc
    resourcesPath: ./resources
  - appID: explorer-agent
    appDirPath: ./
    appPort: 8001
    command: python -m lab.10_dapr_deep_research --mode explorer
    appProtocol: grpc
    resourcesPath: ./resources
  - appID: deepreader-agent
    appDirPath: ./
    appPort: 8002
    command: python -m lab.10_dapr_deep_research --mode deepreader
    appProtocol: grpc
    resourcesPath: ./resources
  - appID: synthesizer-agent
    appDirPath: ./
    appPort: 8003
    command: python -m lab.10_dapr_deep_research --mode synthesizer
    appProtocol: grpc
    resourcesPath: ./resources
  - appID: critic-agent
    appDirPath: ./
    appPort: 8004
    command: python -m lab.10_dapr_deep_research --mode critic
    appProtocol: grpc
    resourcesPath: ./resources
